name: Bug report
description: Report broken behavior in an example or workflow.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Short bug summary
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: affected_path
    attributes:
      label: Affected file or folder path
      placeholder: e.g. mcp-agents/events-finder-mcp-agent/agent.py

  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: e.g. macOS 15, Python 3.11
