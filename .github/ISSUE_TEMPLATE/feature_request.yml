name: Feature request
description: Suggest a new agent idea, enhancement, or improvement.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your proposed feature or improvement.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Which folders/examples are affected?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context (optional)
