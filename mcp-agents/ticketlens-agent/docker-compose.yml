services:
  # Main Agent Service
  ticketlens-agent:
    build: .
    container_name: ticketlens-agent
    volumes:
      - .:/app
    env_file:
      - .env
    restart: unless-stopped
    # Since uAgents doesn't need external ports unless using a public endpoint directly
    # we just let it run its mailbox client.
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"
    networks:
      - agent-network

  # Testing Service
  tester:
    build: .
    container_name: ticketlens-tester
    volumes:
      - .:/app
    env_file:
      - .env
    # Override the default command to run pytest instead
    command: pytest tests/ -v
    profiles:
      - test
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
